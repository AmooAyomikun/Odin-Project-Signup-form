<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-up Form</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="wrapper">
        <div id="image-container">
            <img  id="background" src="./images/photo-1585202900225-6d3ac20a6962.avif" alt="">
            <div class="logo">
                <img src="./images/odin-lined.png" alt="" id="logo">
                <h3>Odin</h3>
            </div>
        </div>

        <div id="body-content">
            <p>This is not a real online service! You know you need something like this in your life to help you realize your deepest dreams. <br>
                Sign up now to get started
            </p>

            <h3>You know you want to</h3>

            <form class="form">
                <h4>Let's do this!</h4>
                <div class="form-container">
                    <div>
                        <label for="first-name">FIRST NAME</label>
                        <input type="text" id="first-name" required>
                    </div>

                    <div>
                        <label for="second-name">SECOND NAME</label>
                        <input type="text" id="second-name" required>
                    </div>
                    
                    <div>
                        <label for="email">EMAIL</label>
                        <input type="email" id="email" required>
                    </div>
                    
                    <div>
                        <label for="phone-number">PHONE NUMBER</label>
                        <input type="number" id="number" required>
                    </div>
                    
                    <div>
                        <label for="password">PASSWORD</label>
                        <input type="password" id="password" required>
                    </div>
                    
                    <div>
                        <label for="confirm-password">CONFIRM PASSWORD</label>
                        <input type="password" id="confirm-password" required>
                    </div>
                </div>
            </form>
            <button id="btn">Create Account</button><br>
            <small>Already have an account?<span>Log in</span></small>
            
        </div>
    </div>
</body>
</html>
